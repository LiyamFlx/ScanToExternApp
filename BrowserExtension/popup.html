<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; width: 280px; padding: 12px; margin: 0; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .green { background: #34c759; }
    .red { background: #ff3b30; }
    button { width: 100%; padding: 6px; }
  </style>
</head>
<body>
  <div class="status">
    <div id="dot" class="dot red"></div>
    <span id="status">Connecting to ScanToExternApp...</span>
  </div>
  <div id="last" style="font-size: 12px; color: #666; min-height: 36px; margin: 6px 0;"></div>
  <button id="open-app">Open ScanToExternApp Menubar</button>
  <script src="popup.js"></script>
</body>
</html>
