<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History — ScanToExternApp</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { padding: 16px; min-height: 500px; display: flex; flex-direction: column; gap: 12px; }
    h2 { font-size: 15px; }

    .toolbar {
      display: flex; gap: 8px; align-items: center;
    }
    .toolbar input { flex: 1; }

    .list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    .record {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .record:hover { border-color: var(--accent); }

    .record .meta {
      display: flex; gap: 8px; align-items: center;
      font-size: 10px; color: var(--text-muted);
      margin-bottom: 4px;
    }
    .record .source-badge {
      background: var(--bg);
      border-radius: 4px; padding: 1px 5px;
      text-transform: uppercase; font-size: 9px; letter-spacing: .05em;
    }
    .record .preview-text {
      font-size: 12px; line-height: 1.4;
      overflow: hidden; max-height: 36px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .record .actions {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .record .actions .btn { font-size: 11px; padding: 3px 8px; }

    .empty { color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 40px; }
    .footer { display: flex; justify-content: space-between; align-items: center; }
    .count { font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
  <h2>📋 Scan History</h2>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search scans…" oninput="onSearch(this.value)">
    <button class="btn" onclick="loadHistory()">↺ Refresh</button>
  </div>

  <div class="list" id="list">
    <div class="empty">Loading…</div>
  </div>

  <div class="footer">
    <span class="count" id="count"></span>
    <button class="btn danger" onclick="clearAll()">Clear All</button>
  </div>

  <script>
    const { invoke } = window.__TAURI__;
    let records = [];

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderRecords(list) {
      const container = document.getElementById('list');
      if (!list.length) {
        container.innerHTML = '<div class="empty">No scans yet.</div>';
        document.getElementById('count').textContent = '';
        return;
      }
      document.getElementById('count').textContent = `${list.length} record${list.length !== 1 ? 's' : ''}`;
      container.innerHTML = list.map(r => `
        <div class="record">
          <div class="meta">
            <span>${formatDate(r.timestamp)}</span>
            <span class="source-badge">${r.source}</span>
            ${r.ai_mode && r.ai_mode !== 'off' ? `<span class="accent">AI: ${r.ai_mode}</span>` : ''}
          </div>
          <div class="preview-text">${escapeHtml(r.processed_text || r.text)}</div>
          <div class="actions">
            <button class="btn primary" onclick="reInject('${r.id}')">↑ Re-inject</button>
            <button class="btn" onclick="copyText('${r.id}')">Copy</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadHistory() {
      records = await invoke('get_history', { limit: 200 });
      renderRecords(records);
    }

    async function onSearch(q) {
      if (!q.trim()) { renderRecords(records); return; }
      const results = await invoke('search_history', { query: q });
      renderRecords(results);
    }

    async function reInject(id) {
      await invoke('re_inject_record', { id });
    }

    function copyText(id) {
      const r = records.find(x => x.id === id);
      if (r) navigator.clipboard.writeText(r.processed_text || r.text);
    }

    async function clearAll() {
      if (confirm('Clear all scan history? This cannot be undone.')) {
        await invoke('clear_history');
        records = [];
        renderRecords([]);
      }
    }

    loadHistory();
  </script>
</body>
</html>
